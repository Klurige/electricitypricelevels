name: Release

on:
  release:
    types: [published]

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    name: Update manifest version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Update version in manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/electricitypricelevels/manifest.json > manifest.tmp \
            && mv manifest.tmp custom_components/electricitypricelevels/manifest.json
          echo "Updated manifest.json to version $VERSION"
          cat custom_components/electricitypricelevels/manifest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/electricitypricelevels/manifest.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update manifest.json version to ${GITHUB_REF_NAME#v}"
          git push
